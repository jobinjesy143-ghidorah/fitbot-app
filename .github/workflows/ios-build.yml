name: "iOS Free Build"
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Smart Project Discovery & Install
        run: |
          # This command finds exactly where your pubspec.yaml is located
          PROJECT_PATH=$(find . -name pubspec.yaml -exec dirname {} \;)
          echo "Project located at: $PROJECT_PATH"
          
          # Move into that folder and install everything
          cd "$PROJECT_PATH"
          flutter pub get
          flutter precache --ios 

      - name: Build iOS (No Signature)
        run: |
          # Find the project again to be safe
          PROJECT_PATH=$(find . -name pubspec.yaml -exec dirname {} \;)
          cd "$PROJECT_PATH"
          flutter build ios --release --no-codesign

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          # This path tells GitHub to look for the result folder wherever it ended up
          path: "**/build/ios/iphoneos/"
