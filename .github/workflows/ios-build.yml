name: "iOS Free Build"
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: List Files (Debug)
        run: ls -R # This helps us see exactly where the files are if it fails

      - name: Install Dependencies
        # IMPORTANT: If your files are in a folder called 'fitbot', change '.' to 'fitbot'
        run: |
          flutter pub get
          flutter precache --ios 
        working-directory: . 

      - name: Build iOS (No Signature)
        run: |
          flutter build ios --release --no-codesign
        working-directory: .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          path: build/ios/iphoneos/
