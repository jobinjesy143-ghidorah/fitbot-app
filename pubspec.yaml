name: fitbot
description: "A new Flutter project for AI fashion styling."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Networking for AI/ML Backend
  http: ^1.2.0
  # Native Hardware access
  camera: ^0.10.5
  permission_handler: ^11.3.0
  # Google AI ML Engine
  google_mlkit_pose_detection: ^0.12.0
  # Icon support
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # ---------------------------------------------------------
  # ASSETS CONFIGURATION (Strict Indentation Fix)
  # ---------------------------------------------------------
  assets:
    - assets/logo.png